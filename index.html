<script>
let lastPredictionData = {};

function getFormData() {
    return {
        age: parseInt(document.getElementById('age').value),
        income: parseFloat(document.getElementById('income').value),
        credit_score: parseFloat(document.getElementById('credit').value),
        loan_amount: parseFloat(document.getElementById('loan').value),
        education: parseInt(document.getElementById('education').value),
        gender: parseInt(document.getElementById('gender').value),
        model_choice: document.getElementById('model_choice').value
    };
}

async function predict() {
    const payload = getFormData();

    // 🔥 FAKE AI LOGIC (no backend needed)
    let score =
        (payload.credit_score / 850) * 0.5 +
        (payload.income / 100000) * 0.3 -
        (payload.loan_amount / 50000) * 0.2;

    score = Math.max(0, Math.min(1, score));

    const data = {
        probability: score,
        prediction: score > 0.5 ? 1 : 0,
        english_explanation:
            "The model analyzed your credit score, income, and loan amount to determine the likelihood of approval.",
        suggestions: [
            { action: "Increase credit score", impact: 0.12 },
            { action: "Reduce loan amount", impact: 0.08 }
        ],
        trust_score: Math.floor(70 + Math.random() * 30),
        dp_diff: Math.random() * 0.1
    };

    lastPredictionData = { payload, data };

    // SAME UI UPDATE CODE (UNCHANGED)
    const probPct = (data.probability * 100).toFixed(1);
    document.getElementById('probability_text').innerText = `Approval Probability: ${probPct}%`;
    document.getElementById('probability_bar').style.width = `${probPct}%`;

    const decText = document.getElementById('decision_text');
    if(data.prediction === 1) {
        decText.innerHTML = "<span class='approved'>✅ APPROVED</span>";
    } else {
        decText.innerHTML = "<span class='rejected'>❌ REJECTED</span>";
    }

    document.getElementById('explanation_text').innerHTML = data.english_explanation;

    const sugBox = document.getElementById('suggestions_box');
    const sugList = document.getElementById('suggestions_list');

    sugList.innerHTML = "";
    data.suggestions.forEach(s => {
        sugList.innerHTML += `<li><b>${s.action}</b> (+${(s.impact*100).toFixed(1)}%)</li>`;
    });
    sugBox.style.display = "block";

    document.getElementById('trust_score_text').innerText = `${data.trust_score}%`;
    document.getElementById('trust_score_bar').style.width = `${data.trust_score}%`;

    const badge = document.getElementById('bias_badge');
    if(data.dp_diff > 0.05) {
        badge.className = "bias-badge bias-warn";
        badge.innerText = "⚠️ Potential Bias Detected";
    } else {
        badge.className = "bias-badge bias-ok";
        badge.innerText = "✅ No significant bias detected";
    }
}

async function sendChat() {
    const input = document.getElementById('chat_input');
    const msg = input.value.trim();
    if(!msg) return;

    const chatHist = document.getElementById('chat_history');
    chatHist.innerHTML += `<div class="chat-user">${msg}</div>`;
    input.value = "";

    setTimeout(() => {
        chatHist.innerHTML += `<div class="chat-bot">The decision is based on fairness-aware AI analysis. You can improve your approval chances by increasing credit score or reducing loan amount.</div>`;
        chatHist.scrollTop = chatHist.scrollHeight;
    }, 500);
}

window.onload = predict;
</script>
