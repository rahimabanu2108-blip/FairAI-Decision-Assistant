<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairAI Decision Assistant</title>

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #0E1117;
    color: #E0E0E0;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
.header h1 { margin: 0; color: #00E5FF; }
.reset-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

.container { display: flex; gap: 20px; max-width: 1000px; width: 100%; }
.col-left, .col-right { display: flex; flex-direction: column; gap: 20px; }
.col-left { flex: 1; }
.col-right { flex: 1.5; }

.card { background: #1E2127; padding: 20px; border-radius: 12px; border: 1px solid #333; }
.card-header { font-size: 1.2rem; color: #00E5FF; margin-bottom: 10px; }

input, select { width: 100%; padding: 8px; margin-top: 5px; background: #0E1117; color: white; border: 1px solid #444; border-radius: 5px; }

.status h2 { font-size: 2rem; }
.approved { color: #00E676; }
.rejected { color: #FF1744; }

.progress-bar-bg { background: #333; height: 10px; border-radius: 5px; }
.progress-bar-fill { background: #00E5FF; height: 100%; border-radius: 5px; }

.chat-container { max-height: 200px; overflow-y: auto; background: #15181E; padding: 10px; border-radius: 8px; }
.chat-bot { background: #1e4b59; padding: 8px; border-radius: 10px; margin: 5px 0; }
.chat-user { background: #2b313c; padding: 8px; border-radius: 10px; margin: 5px 0; text-align: right; }

button { cursor: pointer; }
</style>
</head>

<body>

<div class="header">
<h1>🤖 FairAI Decision Assistant</h1>
<button class="reset-btn" onclick="location.reload()">Reset</button>
</div>

<div class="container">

<div class="col-left">

<div class="card">
<div class="card-header">Applicant Details</div>

<label>Age</label>
<input type="range" id="age" min="18" max="80" value="35" oninput="predict()">

<label>Income</label>
<input type="number" id="income" value="60000" oninput="predict()">

<label>Credit Score</label>
<input type="range" id="credit" min="300" max="850" value="680" oninput="predict()">

<label>Loan</label>
<input type="number" id="loan" value="15000" oninput="predict()">

</div>

<div class="card">
<div class="card-header">Trust Score</div>
<h2 id="trust">--%</h2>
<div class="progress-bar-bg">
<div class="progress-bar-fill" id="trust_bar"></div>
</div>
</div>

</div>

<div class="col-right">

<div class="card">
<div class="card-header">Decision</div>
<div class="status">
<h2 id="decision">...</h2>
</div>
<div class="progress-bar-bg">
<div class="progress-bar-fill" id="prob_bar"></div>
</div>
<p id="prob_text">--%</p>
</div>

<div class="card">
<div class="card-header">Explanation</div>
<p id="explain">Waiting...</p>
</div>

<div class="card">
<div class="card-header">Chat</div>
<div class="chat-container" id="chat"></div>
<input id="msg" placeholder="Ask something..." onkeypress="if(event.key==='Enter')chat()">
<button onclick="chat()">Send</button>
</div>

</div>

</div>

<script>

function predict() {
    let income = document.getElementById("income").value;
    let credit = document.getElementById("credit").value;
    let loan = document.getElementById("loan").value;

    let score = (credit/850)*0.6 + (income/100000)*0.3 - (loan/50000)*0.2;
    let prob = Math.max(0, Math.min(1, score));

    let percent = (prob*100).toFixed(1);

    document.getElementById("prob_text").innerText = percent + "%";
    document.getElementById("prob_bar").style.width = percent + "%";

    if(prob > 0.5){
        document.getElementById("decision").innerHTML = "<span class='approved'>APPROVED</span>";
    } else {
        document.getElementById("decision").innerHTML = "<span class='rejected'>REJECTED</span>";
    }

    document.getElementById("explain").innerText =
        "Decision based on credit score, income and loan balance.";

    let trust = Math.floor(70 + Math.random()*30);
    document.getElementById("trust").innerText = trust + "%";
    document.getElementById("trust_bar").style.width = trust + "%";
}

function chat(){
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    let text = input.value;
    if(!text) return;

    chat.innerHTML += "<div class='chat-user'>"+text+"</div>";

    setTimeout(()=>{
        chat.innerHTML += "<div class='chat-bot'>Improve credit score or reduce loan for better approval chances.</div>";
        chat.scrollTop = chat.scrollHeight;
    },500);

    input.value="";
}

window.onload = predict;

</script>

</body>
</html>
